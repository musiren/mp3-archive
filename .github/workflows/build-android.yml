name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Sets up sdkmanager in PATH and exports ANDROID_SDK_ROOT.
      - uses: android-actions/setup-android@v3

      - name: Install build-tools and locate NDK
        run: |
          # Ensure build-tools 33.0.2 (contains aidl) is present
          sdkmanager "build-tools;33.0.2"

          # Prefer NDK 25.x; fall back to whatever the runner exposes as latest
          NDK_DIR=$(find "$ANDROID_SDK_ROOT/ndk" -maxdepth 1 -name "25.*" -type d \
                    2>/dev/null | sort -V | tail -1)
          if [ -z "$NDK_DIR" ] && [ -d "${ANDROID_NDK_LATEST_HOME:-}" ]; then
            NDK_DIR="$ANDROID_NDK_LATEST_HOME"
          fi
          if [ -z "$NDK_DIR" ]; then
            echo "No NDK found. Available:" && ls "$ANDROID_SDK_ROOT/ndk" 2>/dev/null && exit 1
          fi
          echo "Using NDK: $NDK_DIR"
          echo "NDK_DIR=$NDK_DIR" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            autoconf libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake

      - name: Install buildozer and Cython
        run: pip install buildozer cython virtualenv

      # Inject sdk_path and ndk_path so buildozer uses the pre-installed SDK
      # rather than downloading its own copy. p4a resolves aidl as an absolute
      # path inside sdk_path, so this is the only reliable fix.
      - name: Point buildozer at pre-installed SDK and NDK
        run: |
          sed -i \
            "s|^\[buildozer\]|android.sdk_path = $ANDROID_SDK_ROOT\nandroid.ndk_path = $NDK_DIR\n\n[buildozer]|" \
            buildozer.spec

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3-archive-debug
          path: bin/*.apk
          if-no-files-found: error
