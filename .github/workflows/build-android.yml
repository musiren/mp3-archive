name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            git zip unzip ant \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            autoconf libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake

      - name: Bootstrap Android SDK
        run: |
          SDK="$HOME/android-sdk"
          mkdir -p "$SDK/cmdline-tools"

          for BUILD in 10406996 9477386 8512546; do
            URL="https://dl.google.com/android/repository/commandlinetools-linux-${BUILD}_latest.zip"
            wget -q "$URL" -O /tmp/cmdtools.zip && break
          done
          unzip -q /tmp/cmdtools.zip -d /tmp/
          mv /tmp/cmdline-tools "$SDK/cmdline-tools/latest"

          SDKMGR="$SDK/cmdline-tools/latest/bin/sdkmanager"

          # p4a checks tools/bin/sdkmanager; create a wrapper there
          mkdir -p "$SDK/tools/bin"
          printf '#!/bin/bash\nexec "%s" "$@"\n' "$SDKMGR" > "$SDK/tools/bin/sdkmanager"
          chmod +x "$SDK/tools/bin/sdkmanager"

          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"

          yes | "$SDKMGR" --sdk_root="$SDK" --licenses >/dev/null 2>&1 || true
          "$SDKMGR" --sdk_root="$SDK" \
            "platform-tools" "platforms;android-33" "build-tools;33.0.2" >/dev/null

          # p4a v2024.01.21 supports NDK major version 25 only (r25b is the
          # recommended version). The runner image ships r27/r29, so install
          # r25b explicitly.
          NDK_VER="25.1.8937393"
          NDK_DIR="/usr/local/lib/android/sdk/ndk/$NDK_VER"
          if [ ! -d "$NDK_DIR" ]; then
            "$SDKMGR" --sdk_root="$SDK" "ndk;$NDK_VER" >/dev/null
            NDK_DIR="$SDK/ndk/$NDK_VER"
          fi
          echo "NDK_DIR=$NDK_DIR" >> "$GITHUB_ENV"

      - name: Install buildozer and Cython
        run: pip install -q buildozer "cython==0.29.36" virtualenv

      - name: Point buildozer at SDK and NDK
        run: |
          sed -i \
            "s|^\[buildozer\]|android.sdk_path = $ANDROID_SDK_ROOT\nandroid.ndk_path = $NDK_DIR\n\n[buildozer]|" \
            buildozer.spec

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3-archive-debug
          path: bin/*.apk
          if-no-files-found: error
