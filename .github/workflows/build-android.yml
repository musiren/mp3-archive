name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            autoconf libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake

      - name: Install buildozer and Cython
        run: pip install buildozer cython virtualenv

      # ubuntu-22.04 runners ship NDK 25.x and 26.x under $ANDROID_SDK_ROOT/ndk/.
      # sdkmanager is not on PATH, so we locate the NDK without it.
      - name: Locate pre-installed Android NDK
        run: |
          # Prefer NDK 25.x to match android.ndk = 25b in buildozer.spec
          NDK_DIR=$(find "$ANDROID_SDK_ROOT/ndk" -maxdepth 1 -name "25.*" -type d \
                    2>/dev/null | sort -V | tail -1)
          # Fall back to whichever NDK the runner exposes as "latest"
          if [ -z "$NDK_DIR" ] && [ -d "${ANDROID_NDK_LATEST_HOME:-}" ]; then
            NDK_DIR="$ANDROID_NDK_LATEST_HOME"
          fi
          if [ -z "$NDK_DIR" ]; then
            echo "Available NDKs:" && ls "$ANDROID_SDK_ROOT/ndk" && exit 1
          fi
          echo "Using NDK: $NDK_DIR"
          echo "NDK_DIR=$NDK_DIR" >> "$GITHUB_ENV"

      - name: Point buildozer at pre-installed SDK and NDK
        run: |
          sed -i \
            "s|^\[buildozer\]|android.sdk_path = $ANDROID_SDK_ROOT\nandroid.ndk_path = $NDK_DIR\n\n[buildozer]|" \
            buildozer.spec

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3-archive-debug
          path: bin/*.apk
          if-no-files-found: error
