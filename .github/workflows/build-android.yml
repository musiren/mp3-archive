name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            autoconf libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake

      - name: Install buildozer and Cython
        run: pip install buildozer cython virtualenv

      - name: Ensure NDK 25.2.9519653 is present
        run: |
          if [ ! -d "$ANDROID_SDK_ROOT/ndk/25.2.9519653" ]; then
            sdkmanager "ndk;25.2.9519653"
          fi

      # ubuntu-22.04 runners ship Android SDK at $ANDROID_SDK_ROOT with
      # build-tools 33.0.2 already installed.  Injecting sdk_path/ndk_path
      # into buildozer.spec makes buildozer (and p4a) use that SDK directly
      # instead of downloading a separate copy — so aidl is found at the
      # correct absolute path inside the SDK.
      - name: Point buildozer at pre-installed SDK and NDK
        run: |
          SDK="$ANDROID_SDK_ROOT"
          NDK="$ANDROID_SDK_ROOT/ndk/25.2.9519653"
          sed -i \
            "s|^\[buildozer\]|android.sdk_path = $SDK\nandroid.ndk_path = $NDK\n\n[buildozer]|" \
            buildozer.spec

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3-archive-debug
          path: bin/*.apk
          if-no-files-found: error
