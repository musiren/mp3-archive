name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip ant \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            autoconf libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake

      - name: Bootstrap Android SDK under HOME
        run: |
          SDK="$HOME/android-sdk"
          mkdir -p "$SDK/cmdline-tools"

          DOWNLOADED=0
          for BUILD in 10406996 9477386 8512546; do
            URL="https://dl.google.com/android/repository/commandlinetools-linux-${BUILD}_latest.zip"
            echo "Trying $URL"
            if wget -q "$URL" -O /tmp/cmdtools.zip; then
              echo "Downloaded build $BUILD"
              DOWNLOADED=1
              break
            fi
          done
          [ "$DOWNLOADED" -eq 1 ] || { echo "All cmdline-tools URLs failed"; exit 1; }

          unzip -q /tmp/cmdtools.zip -d /tmp/
          mv /tmp/cmdline-tools "$SDK/cmdline-tools/latest"

          SDKMGR="$SDK/cmdline-tools/latest/bin/sdkmanager"
          echo "sdkmanager: $($SDKMGR --version)"

          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "$SDK/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

          yes | "$SDKMGR" --sdk_root="$SDK" --licenses >/dev/null 2>&1 || true
          "$SDKMGR" --sdk_root="$SDK" \
            "platform-tools" "platforms;android-33" "build-tools;33.0.2"

          # Prefer NDK 28.x (p4a recommended); fall back to any available NDK
          RUNNER_NDK="/usr/local/lib/android/sdk/ndk"
          NDK_DIR=$(find "$RUNNER_NDK" -maxdepth 1 -name "28.*" -type d \
                    2>/dev/null | sort -V | tail -1)
          if [ -z "$NDK_DIR" ]; then
            NDK_DIR=$(find "$RUNNER_NDK" -maxdepth 1 -mindepth 1 -type d \
                      2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$NDK_DIR" ] || [ ! -d "$NDK_DIR" ]; then
            echo "Installing NDK 28 via sdkmanager..."
            "$SDKMGR" --sdk_root="$SDK" "ndk;28.0.12433566"
            NDK_DIR="$SDK/ndk/28.0.12433566"
          fi
          echo "NDK_DIR=$NDK_DIR" >> "$GITHUB_ENV"
          echo "Using NDK: $NDK_DIR"

      - name: Install buildozer and Cython
        run: pip install buildozer cython virtualenv

      - name: Point buildozer at SDK and NDK
        run: |
          sed -i \
            "s|^\[buildozer\]|android.sdk_path = $ANDROID_SDK_ROOT\nandroid.ndk_path = $NDK_DIR\n\n[buildozer]|" \
            buildozer.spec
          echo "=== injected spec lines ===" && grep -E "sdk_path|ndk_path" buildozer.spec

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3-archive-debug
          path: bin/*.apk
          if-no-files-found: error
