name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            autoconf libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake

      # Avoid the system SDK entirely: its tools/bin/sdkmanager crashes on
      # Java 17 (javax.xml.bind removed).  Build a clean SDK under $HOME where
      # we have guaranteed write access, and install a modern sdkmanager there.
      - name: Bootstrap Android SDK under $HOME
        run: |
          SDK="$HOME/android-sdk"
          mkdir -p "$SDK/cmdline-tools"

          echo "=== Downloading Android command-line tools ==="
          # Try three known-good versions in order; fail loudly if all miss.
          DOWNLOADED=0
          for BUILD in 10406996 9477386 8512546; do
            URL="https://dl.google.com/android/repository/commandlinetools-linux-${BUILD}_latest.zip"
            echo "Trying $URL"
            if wget -q "$URL" -O /tmp/cmdtools.zip; then
              echo "Downloaded build $BUILD"
              DOWNLOADED=1
              break
            fi
          done
          [ "$DOWNLOADED" -eq 1 ] || { echo "All cmdline-tools URLs failed"; exit 1; }

          unzip -q /tmp/cmdtools.zip -d /tmp/
          # The zip always extracts to a directory named "cmdline-tools"
          ls /tmp/cmdline-tools/
          mv /tmp/cmdline-tools "$SDK/cmdline-tools/latest"

          SDKMGR="$SDK/cmdline-tools/latest/bin/sdkmanager"
          echo "sdkmanager: $($SDKMGR --version)"

          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "$SDK/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

          yes | "$SDKMGR" --sdk_root="$SDK" --licenses >/dev/null 2>&1 || true
          "$SDKMGR" --sdk_root="$SDK" \
            "platform-tools" "platforms;android-33" "build-tools;33.0.2"

          # Re-use runner's pre-installed NDK (no ~1.5 GB download needed)
          NDK_DIR=$(find /usr/local/lib/android/sdk/ndk \
                    -maxdepth 1 -name "25.*" -type d 2>/dev/null \
                    | sort -V | tail -1)
          [ -z "$NDK_DIR" ] && NDK_DIR="${ANDROID_NDK_LATEST_HOME:-}"
          if [ -z "$NDK_DIR" ] || [ ! -d "$NDK_DIR" ]; then
            echo "No pre-installed NDK; installing 25.2.9519653 ..."
            "$SDKMGR" --sdk_root="$SDK" "ndk;25.2.9519653"
            NDK_DIR="$SDK/ndk/25.2.9519653"
          fi
          echo "NDK_DIR=$NDK_DIR" >> "$GITHUB_ENV"
          echo "Using NDK: $NDK_DIR"

      - name: Install buildozer and Cython
        run: pip install buildozer cython virtualenv

      - name: Point buildozer at the bootstrapped SDK and NDK
        run: |
          sed -i \
            "s|^\[buildozer\]|android.sdk_path = $ANDROID_SDK_ROOT\nandroid.ndk_path = $NDK_DIR\n\n[buildozer]|" \
            buildozer.spec
          echo "=== buildozer.spec (tail) ===" && tail -6 buildozer.spec

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3-archive-debug
          path: bin/*.apk
          if-no-files-found: error
