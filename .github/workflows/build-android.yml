name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev \
            autoconf libtool pkg-config \
            libncurses5-dev libncursesw5-dev \
            cmake

      # The ubuntu-22.04 runner ships an old tools/bin/sdkmanager that crashes
      # on Java 17 (javax.xml.bind removed from JDK 11+).  android-actions/
      # setup-android skips cmdline-tools installation when the SDK dir already
      # exists, so we bypass it entirely: download fresh cmdline-tools from
      # Google into $HOME/android-sdk where we have guaranteed write access.
      - name: Set up Android SDK with Java-17-compatible sdkmanager
        run: |
          SDK="$HOME/android-sdk"
          mkdir -p "$SDK/cmdline-tools"

          # Try cmdline-tools 11.0 first, fall back to 9.0
          wget -q \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -O /tmp/cmdtools.zip \
          || wget -q \
            https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip \
            -O /tmp/cmdtools.zip

          unzip -q /tmp/cmdtools.zip -d /tmp/
          mv /tmp/cmdline-tools "$SDK/cmdline-tools/latest"

          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "$SDK/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

          SDKMGR="$SDK/cmdline-tools/latest/bin/sdkmanager"
          echo "sdkmanager version: $("$SDKMGR" --version)"

          # Accept all licenses silently
          yes | "$SDKMGR" --sdk_root="$SDK" --licenses >/dev/null 2>&1 || true

          # Install required SDK components
          "$SDKMGR" --sdk_root="$SDK" \
            "platform-tools" "platforms;android-33" "build-tools;33.0.2"

          # Locate NDK from the runner image (prefer 25.x, fall back to latest)
          RUNNER_NDK_ROOT="/usr/local/lib/android/sdk/ndk"
          NDK_DIR=$(find "$RUNNER_NDK_ROOT" -maxdepth 1 -name "25.*" -type d \
                    2>/dev/null | sort -V | tail -1)
          if [ -z "$NDK_DIR" ] && [ -d "${ANDROID_NDK_LATEST_HOME:-}" ]; then
            NDK_DIR="$ANDROID_NDK_LATEST_HOME"
          fi
          if [ -z "$NDK_DIR" ]; then
            echo "No pre-installed NDK found — installing ndk;25.2.9519653"
            "$SDKMGR" --sdk_root="$SDK" "ndk;25.2.9519653"
            NDK_DIR="$SDK/ndk/25.2.9519653"
          fi
          echo "NDK_DIR=$NDK_DIR" >> "$GITHUB_ENV"
          echo "Using NDK: $NDK_DIR"

      - name: Install buildozer and Cython
        run: pip install buildozer cython virtualenv

      - name: Point buildozer at SDK and NDK
        run: |
          sed -i \
            "s|^\[buildozer\]|android.sdk_path = $ANDROID_SDK_ROOT\nandroid.ndk_path = $NDK_DIR\n\n[buildozer]|" \
            buildozer.spec

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3-archive-debug
          path: bin/*.apk
          if-no-files-found: error
